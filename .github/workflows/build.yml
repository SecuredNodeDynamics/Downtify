name: Build and Push Docker Image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to tag the image with, for example 2.10.0'
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"
          if [[ -z "$version" && "${{ github.event_name }}" == "release" ]]; then
            version="${{ github.event.release.tag_name }}"
          fi
          if [[ -z "$version" ]]; then
            version="$(git describe --tags --always | cut -d'-' -f1)"
          fi
          version="${version#v}"
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid Docker image version: $version" >&2
            exit 1
          fi
          echo "VERSION=$version" >> "$GITHUB_OUTPUT"
          echo "V_TAG=v$version" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          annotations: |
            type=org.opencontainers.image.description, value=Download your Spotify playlists and songs along with album art and metadata in a self-hosted way via Docker.
            type=org.opencontainers.image.url, value=https://github.com/SecuredNodeDynamics/Downtify
            type=org.opencontainers.image.source, value=https://github.com/SecuredNodeDynamics/Downtify
            type=org.opencontainers.image.version, value=${{ steps.version.outputs.VERSION }}
            type=org.opencontainers.image.authors, value=SecuredNodeDynamics
            type=org.opencontainers.image.licenses, value=GPL-3.0
            type=org.opencontainers.image.vendor, value=SecuredNodeDynamics
            type=org.opencontainers.image.base.name, value=python:3.13-alpine
            type=org.opencontainers.image.title, value=Downtify

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push app image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/securednodedynamics/downtify:latest
            ghcr.io/securednodedynamics/downtify:${{ steps.version.outputs.VERSION }}
            ghcr.io/securednodedynamics/downtify:${{ steps.version.outputs.V_TAG }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            DOCKER_METADATA_OUTPUT_JSON
