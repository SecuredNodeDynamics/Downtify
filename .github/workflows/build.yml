name: Build and Push Docker Image

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version from git tags
        id: version
        run: echo "VERSION=$(git describe --tags --always | cut -d'-' -f1)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          annotations: |
            type=org.opencontainers.image.description, value=Download your Spotify playlists and songs along with album art and metadata in a self-hosted way via Docker.
            type=org.opencontainers.image.url, value=https://github.com/SecuredNodeDynamics/Downtify
            type=org.opencontainers.image.source, value=https://github.com/SecuredNodeDynamics/Downtify
            type=org.opencontainers.image.version, value=${{ steps.version.outputs.VERSION }}
            type=org.opencontainers.image.authors, value=SecuredNodeDynamics
            type=org.opencontainers.image.licenses, value=GPL-3.0
            type=org.opencontainers.image.vendor, value=SecuredNodeDynamics
            type=org.opencontainers.image.base.name, value=python:3.13-alpine
            type=org.opencontainers.image.title, value=Downtify

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push app image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/securednodedynamics/downtify:latest
            ghcr.io/securednodedynamics/downtify:${{ steps.version.outputs.VERSION }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            DOCKER_METADATA_OUTPUT_JSON