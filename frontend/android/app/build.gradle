apply plugin: 'com.android.application'
apply plugin: 'com.chaquo.python'

def releaseSigningAvailable = false
def releaseKeystore = new Properties()

def keystorePropertiesFile = rootProject.file('keystore.properties')
if (keystorePropertiesFile.exists()) {
    releaseKeystore.load(new FileInputStream(keystorePropertiesFile))
    releaseSigningAvailable = true
} else if (System.getenv('ANDROID_KEYSTORE_PATH')) {
    releaseKeystore['storeFile'] = System.getenv('ANDROID_KEYSTORE_PATH')
    releaseKeystore['storePassword'] = System.getenv('ANDROID_KEYSTORE_PASSWORD')
    releaseKeystore['keyAlias'] = System.getenv('ANDROID_KEY_ALIAS')
    releaseKeystore['keyPassword'] = System.getenv('ANDROID_KEY_PASSWORD')
    releaseSigningAvailable = true
}

android {
    namespace = "com.securednodedynamics.downtify"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.securednodedynamics.downtify"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 2011033
        versionName "2.11.33"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        // Chaquopy (embedded Python) only ships native code for these ABIs.
        // Add "armeabi-v7a" if you also need 32-bit device support (requires
        // matching ffmpeg + pydantic-core builds for that ABI).
        ndk {
            abiFilters "arm64-v8a", "x86_64"
        }
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    if (releaseSigningAvailable) {
        signingConfigs {
            release {
                keyAlias releaseKeystore['keyAlias']
                keyPassword releaseKeystore['keyPassword']
                storeFile rootProject.file(releaseKeystore['storeFile'])
                storePassword releaseKeystore['storePassword']
                v1SigningEnabled true
                v2SigningEnabled true
                enableV3Signing true
                enableV4Signing true
            }
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            if (releaseSigningAvailable) {
                signingConfig signingConfigs.release
            }
        }
    }
    // The bundled ffmpeg ships as libffmpeg.so under jniLibs. Modern Android
    // only allows executing binaries from the extracted native library
    // directory, so force legacy (extracted) packaging for native libs.
    packaging {
        jniLibs {
            useLegacyPackaging = true
        }
    }
}

// Embedded Python backend (Chaquopy). Pydantic is pinned to v1 because
// pydantic-core (v2) has no prebuilt Android wheel; FastAPI runs fine on v1.
chaquopy {
    defaultConfig {
        version "3.11"
        pip {
            install "pydantic<2"
            // Pin below 0.100 so pip does not pull orjson/ujson (Rust wheels
            // that Chaquopy cannot build on Android).
            install "fastapi==0.99.1"
            install "uvicorn==0.27.1"
            install "websockets"
            install "yt-dlp"
            install "ytmusicapi"
            install "mutagen"
            install "Pillow"
            install "requests"
            install "loguru"
            install "load-dotenv"
        }
    }
    // Chaquopy uses src/main/python as the default source set, where the
    // build stages main.py + downtify/ (see the copy task below).
}

// Stage the Python backend (main.py + downtify/) into the Chaquopy source
// directory so the embedded interpreter can import it. Runs at configuration
// time so the files exist before Chaquopy collects sources.
def downtifyRepoRoot = file("$rootDir/../..")
def downtifyPythonSrc = file("src/main/python")
delete(downtifyPythonSrc)
copy {
    from(downtifyRepoRoot) {
        include 'main.py'
        include 'downtify/**'
        exclude '**/__pycache__/**'
        exclude '**/*.pyc'
    }
    into downtifyPythonSrc
}

if (!releaseSigningAvailable) {
    logger.lifecycle(
        'Release signing is not configured. Create frontend/android/keystore.properties ' +
        'or set ANDROID_KEYSTORE_PATH and related env vars before building a release APK.'
    )
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation "androidx.documentfile:documentfile:1.0.1"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
